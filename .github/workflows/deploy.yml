name: Build and Deploy Store

on:
  # 1. Runs automatically whenever you push code changes from VS Code
  push:
    branches: ["main", "master"]
  
  # 2. Runs automatically every 2 hours
  schedule:
    - cron: '0 */2 * * *'
    
  # 3. Gives you a manual "Build Now" button in the GitHub Actions tab
  workflow_dispatch:

# Sets permissions so the script is allowed to deploy to your GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple builds from running over each other
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Site with Eleventy
        run: npm run build
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4