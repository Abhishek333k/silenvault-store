<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilenVault | Custom Requests</title>
    <meta name="description" content="Submit custom requests for bespoke live wallpapers, scripts, and software.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <script src="assets/js/layout.js" defer></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #f8fafc; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .mono { font-family: 'Fira Code', monospace; }
        
        .cinematic-bg { position: fixed; inset: 0; z-index: -2; background-color: #02040a; overflow: hidden; }
        .cinematic-vignette {
            position: absolute; inset: 0; z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, #000000 100%),
                        linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 80%, #000000 100%);
        }

        .premium-glass-panel {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.25rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.02);
        }

        /* Custom Form Styling */
        .sv-input {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 0.75rem 1rem; border-radius: 0.5rem; font-family: 'Inter', sans-serif;
            transition: all 0.3s ease; outline: none;
        }
        .sv-input:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .sv-label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; font-family: 'Fira Code', monospace;}

        /* File Upload Customization */
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-upload-btn {
            border: 1px dashed rgba(255,255,255,0.2); background: rgba(255,255,255,0.02);
            color: #cbd5e1; padding: 1.5rem; text-align: center; border-radius: 0.5rem;
            cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .file-upload-wrapper:hover .file-upload-btn { border-color: #38bdf8; background: rgba(56, 189, 248, 0.05); color: #fff; }
        .file-upload-input { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }

        .btn-submit {
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%); color: #000;
            border-radius: 9999px; transition: all 0.3s ease; font-weight: 800; width: 100%;
            padding: 1rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="cinematic-bg">
        <canvas id="neural-canvas"></canvas>
        <div class="cinematic-vignette"></div>
    </div>

    <sv-header base-path="."></sv-header>

    <main class="relative z-10 w-full max-w-3xl mx-auto px-4 pt-32 pb-24 text-center">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 border border-white/10 bg-white/5 backdrop-blur-md text-slate-300 text-[10px] font-bold mono tracking-widest rounded-full mb-6 uppercase">
            Comms Channel Open
        </div>
        <h1 class="text-4xl md:text-5xl font-black text-white tracking-tighter drop-shadow-2xl mb-4">
            Bespoke <span class="text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-emerald-400">Requests</span>
        </h1>
        <p class="text-slate-400 font-light max-w-xl mx-auto mb-10">Need a custom live wallpaper resolution? Have a specific automation script request? Upload your references and transmit your specifications below.</p>

        <div class="premium-glass-panel p-8 md:p-12 text-left">
            <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data" id="custom-request-form">
                
                <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                
                <input type="hidden" name="subject" value="New Custom Request from SilenVault Store">
                <input type="hidden" name="redirect" value="https://store.silenvault.com/request.html?success=true">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="sv-label">Alias / Name</label>
                        <input type="text" name="name" required class="sv-input" placeholder="Enter your identifier">
                    </div>
                    <div>
                        <label class="sv-label">Secure Comm Link (Email)</label>
                        <input type="email" name="email" required class="sv-input" placeholder="Enter your email">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="sv-label">Asset Classification</label>
                    <select name="request_type" required class="sv-input appearance-none">
                        <option value="Custom Wallpaper">Custom Live Wallpaper</option>
                        <option value="Script Automation">Script Automation (.bat/.ps1)</option>
                        <option value="Software Tool">Software / Tool Modification</option>
                        <option value="Other">Other Query</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="sv-label">Specification Details</label>
                    <textarea name="message" required rows="5" class="sv-input" placeholder="Describe your exact requirements. If requesting a wallpaper, specify resolution, aspect ratio, and aesthetic..."></textarea>
                </div>

                <div class="mb-8">
                    <label class="sv-label">Reference Attachments (Optional)</label>
                    <div class="file-upload-wrapper">
                        <div class="file-upload-btn">
                            <svg class="w-8 h-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                            <span class="text-sm font-bold" id="file-name-display">Click or Drag File Here</span>
                            <span class="text-xs text-slate-500 font-light">Max 10MB (Images, ZIP, TXT)</span>
                        </div>
                        <input type="file" name="attachment" class="file-upload-input" onchange="updateFileName(this)">
                    </div>
                </div>

                <button type="submit" class="btn-submit">Transmit Encrypted Request</button>
                
                <div id="success-msg" class="hidden mt-6 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-lg text-emerald-400 text-sm font-bold text-center mono">
                    TRANSMISSION SUCCESSFUL. WE WILL REVIEW AND RESPOND SHORTLY.
                </div>
            </form>
        </div>
    </main>

    <sv-footer base-path="."></sv-footer>

    <script>
        // Update file name when user selects a file
        function updateFileName(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                display.innerText = "Attached: " + input.files[0].name;
                display.classList.add('text-emerald-400');
            } else {
                display.innerText = "Click or Drag File Here";
                display.classList.remove('text-emerald-400');
            }
        }

        // Show success message if redirected back
        if (window.location.search.includes('success=true')) {
            document.getElementById('success-msg').classList.remove('hidden');
            // Clean the URL without refreshing
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // --- NEURAL CANVAS ---
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; initParticles(); }
        window.addEventListener('resize', resize);

        class Particle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 0.5; 
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            let numberOfParticles = (width * height) / 14000; 
            for (let i = 0; i < numberOfParticles; i++) { particles.push(new Particle()); }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x; let dy = particles[i].y - particles[j].y; let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.beginPath(); ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 - distance/1000})`; ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
                if (mouse.x != null && mouse.y != null) {
                    let dx = particles[i].x - mouse.x; let dy = particles[i].y - mouse.y; let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        ctx.beginPath(); ctx.strokeStyle = `rgba(0, 240, 255, ${0.3 - distance/500})`; ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        resize(); animate();
    </script>
</body>
</html>
